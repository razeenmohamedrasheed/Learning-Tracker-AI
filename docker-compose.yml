version: "3.8"

services:

  # -------------------------------------------------------
  # PostgreSQL Database
  # -------------------------------------------------------
  db:
    image: postgres:15
    container_name: learning_tracker_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # FastAPI Application
  # -------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learning_tracker_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ASYNC_DATABASE_URL: ${ASYNC_DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data: